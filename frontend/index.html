<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My ET | AI News Navigator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background-color: #f5f7fa; }
.hero { background: black; color: white; padding: 50px; text-align: center; }
.card { border-radius: 15px; }
.section-title { margin-top: 20px; font-weight: bold; }
.highlight { background: #eaf4ff; padding: 10px; border-radius: 8px; }
</style>
</head>

<body>

<div class="hero">
    <h1>🧠 MyET AI News Navigator</h1>
    <p>AI-powered Vernacular Business News Experience (India-first)</p>
</div>

<div class="container mt-5">

    <!-- INPUT -->
    <div class="card p-4 shadow-sm">

        <input id="topic" class="form-control mb-3" placeholder="Enter Topic">

        <select id="lang" class="form-select mb-3">
            <option value="Bengali">Bengali (বাংলা)</option>
            <option value="Hindi">Hindi (हिन्दी)</option>
            <option value="Tamil">Tamil (தமிழ்)</option>
            <option value="Telugu">Telugu (తెలుగు)</option>
            <option value="Marathi">Marathi (मराठी)</option>
            <option value="English">English</option>
        </select>

        <select id="type" class="form-select mb-3">
            <option value="student">Student 🎓</option>
            <option value="investor">Investor 📈</option>
            <option value="professional">Professional 💼</option>
        </select>

        <button onclick="getNews()" class="btn btn-primary w-100 fw-bold">
            Generate AI Briefing
        </button>

    </div>

    <!-- LOADER -->
    <div id="loader" class="text-center mt-4" style="display:none;">
        <div class="spinner-border text-primary"></div>
        <p>Analyzing Indian & Global news...</p>
    </div>

    <!-- RESULT -->
    <div id="result" class="card mt-4 p-4 shadow" style="display:none;">
        <h3 id="title"></h3>

        <div id="briefSections"></div>

        <h5 class="section-title">📰 Sources</h5>
        <ul id="sources"></ul>

        <!-- QUICK BUTTONS -->
        <div class="mt-3">
            <button class="btn btn-outline-primary btn-sm" onclick="quickAsk('Explain simpler')">Explain Simpler</button>
            <button class="btn btn-outline-success btn-sm" onclick="quickAsk('Impact on India')">Impact on India</button>
            <button class="btn btn-outline-warning btn-sm" onclick="quickAsk('Give examples')">Examples</button>
        </div>
    </div>

    <!-- CHAT -->
    <div id="chatBox" class="card mt-4 p-4 shadow" style="display:none;">
        <h5>💬 Ask AI</h5>
        <input id="query" class="form-control mb-2" placeholder="Ask anything...">
        <button onclick="askAI()" class="btn btn-dark">Ask</button>
        <p id="reply" class="mt-3 highlight"></p>
    </div>

</div>

<script>

function formatSections(text) {
    return text.replace(/\n/g, "<br>");
}

async function getNews() {
    const topic = document.getElementById("topic").value;
    const lang = document.getElementById("lang").value;
    const type = document.getElementById("type").value;

    document.getElementById("loader").style.display = "block";
    document.getElementById("result").style.display = "none";

    const res = await fetch(`http://localhost:5000/news/${encodeURIComponent(topic)}/${lang}/${type}`);
    const data = await res.json();

    document.getElementById("title").innerText = data.topic;
    document.getElementById("briefSections").innerHTML = formatSections(data.briefing);

    document.getElementById("sources").innerHTML =
        data.sources.map(s => `<li>${s}</li>`).join("");

    document.getElementById("loader").style.display = "none";
    document.getElementById("result").style.display = "block";
    document.getElementById("chatBox").style.display = "block";
}

async function askAI() {
    const query = document.getElementById("query").value;
    const context = document.getElementById("briefSections").innerText;

    const res = await fetch("http://localhost:5000/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ query, context })
    });

    const data = await res.json();
    document.getElementById("reply").innerText = data.reply;
}

function quickAsk(text) {
    document.getElementById("query").value = text;
    askAI();
}

</script>

</body>
</html>
